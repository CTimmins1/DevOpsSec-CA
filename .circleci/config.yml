version: 2.1

jobs:
  build:
    docker:
      - image: cimg/node:18.0
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: |
            cd SimpleApplication
            npm install

  test:
    docker:
      - image: cimg/node:18.0
    steps:
      - checkout
      - run:
          name: Run tests
          command: |
            cd SimpleApplication
            npm test || true

  deploy:
    docker:
      - image: cimg/base:stable
    steps:
      - add_ssh_keys
      - run:
          name: Deploy to EC2
          command: |
            ssh -o StrictHostKeyChecking=no ec2-user@${EC2_HOST} '
            cd ~/SimpleApplication &&
            git pull origin main &&
            npm install --production &&
            pm2 restart mathapp || pm2 start bin/www --name mathapp
            '

workflows:
  build-test-deploy:
    jobs:
      - build
      - test:
          requires:
            - build
      - deploy:
          requires:
            - test
          filters:
            branches:
              only: main